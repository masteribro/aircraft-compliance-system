spring:
  application:
    name: aircraft-compliance-system
  datasource:
    # Use H2 for development/testing - comment out for PostgreSQL
    url: jdbc:h2:mem:aircraft_db
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    # Uncomment for PostgreSQL:
    # url: jdbc:postgresql://localhost:5432/aircraft_db
    # username: postgres
    # password: postgres
    # driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        # Change to PostgreSQLDialect when using PostgreSQL
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
  liquibase:
    enabled: false

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: your-secret-key-change-in-production-min-32-chars
  expiration: 86400000

logging:
  level:
    root: INFO
    com.aircraft.compliance: DEBUG
